<VirtualHost *:80>
  ServerName ca1.test.mtcs.dev
  Redirect permanent / https://ca1.test.mtcs.dev/
</VirtualHost>

<VirtualHost *:80>
  ServerName ca2.test.mtcs.dev
  Redirect permanent / https://ca2.test.mtcs.dev/
</VirtualHost>

<VirtualHost *:80>
  ServerName mirror1.test.mtcs.dev
  Redirect permanent / https://mirror1.test.mtcs.dev/
</VirtualHost>

<VirtualHost *:80>
  ServerName mirror2.test.mtcs.dev
  Redirect permanent / https://mirror2.test.mtcs.dev/
</VirtualHost>

<VirtualHost *:443>
  ServerName ca1.test.mtcs.dev
  AllowEncodedSlashes NoDecode
  ProxyPass / http://127.0.0.1:14080/
  ProxyPassReverse / http://127.0.0.1:14080/
  SSLCertificateFile /etc/letsencrypt/live/ca1.test.mtcs.dev/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/ca1.test.mtcs.dev/privkey.pem
  Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>

<VirtualHost *:443>
  ServerName ca2.test.mtcs.dev
  AllowEncodedSlashes NoDecode
  ProxyPass / http://127.0.0.1:15080/
  ProxyPassReverse / http://127.0.0.1:15080/
  SSLCertificateFile /etc/letsencrypt/live/ca2.test.mtcs.dev/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/ca2.test.mtcs.dev/privkey.pem
  Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>

<VirtualHost *:443>
  ServerName mirror1.test.mtcs.dev
  AllowEncodedSlashes NoDecode
  ProxyPass / http://127.0.0.1:14081/
  ProxyPassReverse / http://127.0.0.1:14081/
  SSLCertificateFile /etc/letsencrypt/live/mirror1.test.mtcs.dev/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/mirror1.test.mtcs.dev/privkey.pem
  Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>

<VirtualHost *:443>
  ServerName mirror2.test.mtcs.dev
  AllowEncodedSlashes NoDecode
  ProxyPass / http://127.0.0.1:15081/
  ProxyPassReverse / http://127.0.0.1:15081/
  SSLCertificateFile /etc/letsencrypt/live/mirror2.test.mtcs.dev/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/mirror2.test.mtcs.dev/privkey.pem
  Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
