Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
<Directory /var/www/certbot/.well-known/acme-challenge/>
    Options None
    AllowOverride None
    Require all granted
</Directory>

<VirtualHost *:80>
  ServerName ca1.test.mtcs.dev
  ProxyPreserveHost On
  AllowEncodedSlashes NoDecode
  ProxyPass /.well-known/acme-challenge/ !
  ProxyPass / http://cactus:14080/
  ProxyPassReverse / http://cactus:14080/
</VirtualHost>

<VirtualHost *:80>
  ServerName mirror1.test.mtcs.dev
  ProxyPreserveHost On
  AllowEncodedSlashes NoDecode
  ProxyPass /.well-known/acme-challenge/ !
  ProxyPass /mirror/ http://skylight:8081/mirror/
  ProxyPassReverse /mirror/ http://skylight:8081/mirror/
  DocumentRoot /var/www/mirror1
  <Directory /var/www/mirror1>
      Require all granted
  </Directory>
</VirtualHost>

<IfFile /etc/letsencrypt/live/ca1.test.mtcs.dev/fullchain.pem>
<VirtualHost *:443>
  ServerName ca1.test.mtcs.dev
  SSLEngine on
  ProxyPreserveHost On
  AllowEncodedSlashes NoDecode
  ProxyPass / http://cactus:14080/
  ProxyPassReverse / http://cactus:14080/
  SSLCertificateFile /etc/letsencrypt/live/ca1.test.mtcs.dev/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/ca1.test.mtcs.dev/privkey.pem
  IncludeOptional /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfFile>

<IfFile /etc/letsencrypt/live/mirror1.test.mtcs.dev/fullchain.pem>
<VirtualHost *:443>
  ServerName mirror1.test.mtcs.dev
  SSLEngine on
  ProxyPreserveHost On
  AllowEncodedSlashes NoDecode
  ProxyPass /mirror/ http://skylight:8081/mirror/
  ProxyPassReverse /mirror/ http://skylight:8081/mirror/
  DocumentRoot /var/www/mirror1
  <Directory /var/www/mirror1>
      Require all granted
  </Directory>
  SSLCertificateFile /etc/letsencrypt/live/mirror1.test.mtcs.dev/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/mirror1.test.mtcs.dev/privkey.pem
  IncludeOptional /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfFile>
